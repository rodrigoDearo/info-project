services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fleet_sqlserver
    environment:
      MSSQL_SA_PASSWORD: "S3nh4_F0rt3_2026!"
      SA_PASSWORD: "S3nh4_F0rt3_2026!"
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
    ports:
      - '1433:1433'
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "S3nh4_F0rt3_2026!", "-Q", "SELECT 1", "-b", "-o", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  mongodb:
    image: mongo:7-jammy
    container_name: fleet_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleet_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fleet_rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: development
    container_name: fleet_api
    env_file: .env
    environment:
      DB_HOST: sqlserver
      MONGODB_URI: mongodb://mongodb:27017/fleet_audit
      REDIS_HOST: redis
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      sqlserver: { condition: service_healthy }
      mongodb:   { condition: service_healthy }
      redis:     { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    command: >
      sh -c "npm run db:create &&
         npm run migration:run &&
         npm run seed &&
         npm run start:dev"

volumes:
  sqlserver_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
